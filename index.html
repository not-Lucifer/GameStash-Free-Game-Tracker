<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Stash</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <h2>Game<span class="highlight">Stash</span></h2>
            </div>
            <nav class="nav-menu">
                <a href="#" class="nav-item active">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                    Storefront
                </a>
                <a href="#" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
                    Library
                </a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="search-bar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" placeholder="Search giveaways...">
                </div>
            </header>

            <div class="hero-section">
                <h1>Featured <span>Freebies</span></h1>
                <p>Curated list of 100% free trusted DRM games (Steam, Epic, GOG, Itchio).</p>
            </div>

            <div class="games-grid" id="games-grid">
                <div class="loader-container">
                    <div class="spinner"></div>
                    <p>Syncing live database...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- In-App Browser Modal -->
    <div id="browser-modal" class="browser-modal hidden">
        <div class="browser-header">
            <button class="close-btn" onclick="closeBrowser()">✕ Back to Launcher</button>
            <span class="browser-title" id="browser-title"></span>
        </div>
        <div class="browser-content">
            <!-- Iframe to show the external store link within the app -->
            <iframe id="browser-frame" src="about:blank" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
        </div>
    </div>

    <script>
        const modal = document.getElementById('browser-modal');
        const iframe = document.getElementById('browser-frame');
        const browserTitle = document.getElementById('browser-title');

        // Note: fetchGiveaways() and resolveDirectUrl() are C++ functions exposed to JS via Zserge Webview
        async function openBrowser(url, title) {
            browserTitle.innerText = "Resolving store URL...";
            modal.classList.remove('hidden');
            iframe.src = 'about:blank';
            
            try {
                // Wait for C++ backend to handle the HTTPS WinHttp redirects and return the Epic/Steam URL
                const directUrl = await resolveDirectUrl(url);
                browserTitle.innerText = title;
                iframe.src = directUrl;
            } catch (e) {
                // If it fails, fallback to the original tracker link
                browserTitle.innerText = title;
                iframe.src = url;
            }
        }

        function closeBrowser() {
            modal.classList.add('hidden');
            iframe.src = 'about:blank';
            browserTitle.innerText = '';
        }

        async function loadGames() {
            try {
                const dataStr = await fetchGiveaways();
                const games = JSON.parse(dataStr);
                const grid = document.getElementById('games-grid');
                grid.innerHTML = '';

                if (games.length === 0) {
                    grid.innerHTML = '<p>No trusted giveaways found.</p>';
                    return;
                }

                games.forEach(game => {
                    // Safe injection
                    const cleanTitle = game.title.replace(/'/g, "\\'");
                    const priceSubText = game.worth_inr !== 'N/A' ? `<span class="price-strikethrough">${game.worth_inr}</span>` : '';
                    
                    const card = document.createElement('div');
                    card.className = 'game-card';
                    card.innerHTML = `
                        <div class="game-image" style="background-image: url('${game.thumbnail}')">
                            <div class="platform-badge">${game.platforms}</div>
                        </div>
                        <div class="game-info">
                            <h3>${game.title}</h3>
                            <div class="price-row">
                                ${priceSubText}
                                <span class="price-free">FREE</span>
                            </div>
                            <button class="claim-btn" onclick="openBrowser('${game.open_giveaway_url}', '${cleanTitle}')">Claim Now</button>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (error) {
                document.getElementById('games-grid').innerHTML = '<p style="color:red">Error syncing with database. Launch over active connection.</p>';
            }
        }
    </script>
</body>
</html>
